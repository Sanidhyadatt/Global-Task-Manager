<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to Global Task Manager.">
    <title>Login | Global Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="auth-container">
        <div class="auth-topbar">
            <button id="themeToggle" class="btn-secondary" type="button">Dark mode</button>
        </div>
        <section id="feedback" class="feedback hide"></section>
        <article class="card auth-single">
            <h1>Welcome Back</h1>
            <p class="sub">Login to continue managing your tasks.</p>
            <form id="loginForm" class="stack">
                <input id="loginEmail" type="email" placeholder="Email" required>
                <input id="loginPassword" type="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p class="auth-switch">No account? <a href="signup.html">Create one</a></p>
        </article>
    </main>
    <script src="theme.js"></script>
    <script src="auth.js"></script>
</body>
</html>
