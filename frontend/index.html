<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A dynamic, premium Task Management application.">
    <title>Global Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <main class="container">
        <header class="header">
            <h1>Global Task Manager</h1>
            <p class="subtitle">Organize your universe.</p>
        </header>

        <section class="glass-card">
            <div class="input-group">
                <input type="text" id="title" placeholder="What needs to be done?" autocomplete="off">
                <button id="addBtn" aria-label="Add Task">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
            
            <div class="toolbar">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search" placeholder="Search tasks...">
                </div>
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Done</button>
                </div>
                <div class="stats" id="stats">0 / 0 completed</div>
            </div>

            <div id="error-msg" class="error-msg"></div>

            <div class="tasks-container" id="list">
                <!-- Tasks will be injected here -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
